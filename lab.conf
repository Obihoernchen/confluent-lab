# Configuration for the confluent quickstart lab.  Every value here can be
# changed before running ./setup.sh; the defaults aim at a notebook with
# 16 GB of RAM or more.

# Where libvirt keeps the lab disk images (a libvirt dir pool is created here).
LABDIR=/var/lib/libvirt/images/confluent-lab

# Where the big downloads (cloud image, DVD ISO, ~12 GB) are cached; a
# subfolder of the lab directory, like run/.  ./destroy.sh --keep-cache
# preserves it.
CACHEDIR=$BASEDIR/cache

# Serial consoles of all lab VMs are logged here (root-owned, use sudo tail).
CONSOLEDIR=/var/log/libvirt/consoles

# The one lab password: BMC admin user, root on the server VM, root on the
# deployed nodes.  Deliberately trivial -- this is a learning lab.
LABPASSWORD=confluent

# VM sizing.  The stateful install (anaconda) and the stateless RAM boot each
# want ~3 GB in the client; the server also builds the stateless image.
SERVER_RAM_MB=6144
SERVER_VCPUS=2
SERVER_DISK_GB=80        # sparse qcow2, real usage stays far lower
CLIENT_RAM_MB=4096
CLIENT_VCPUS=2
NODE01_DISK_GB=20        # node01 only; node02 has no disk at all

# The isolated deployment network (first three octets).  The server gets .1,
# the nodes get .1x computed by a confluent attribute expression ({10+n1}).
INTERNAL_NET=172.31.0

# Static address of the server VM on the libvirt 'default' NAT network.
SERVER_MGMT_IP=192.168.122.180

# MAC prefix for all lab NICs (:01 server mgmt, :02 server internal,
# :11 node01, :12 node02).
MAC_PREFIX=52:54:00:cf:10

# Redfish BMC ports on 192.168.122.1; per-node port is BASE+n1 (8441, 8442).
SUSHY_PORT_BASE=8440

# Each BMC also gets its own address as seen from the confluent server
# (BASE+n1 in the last octet: .201, .202) -- confluent expects one BMC per
# address on the standard port 443; the server VM maps these to the
# emulator ports above.
BMC_ADDR_BASE=192.168.122.200

# DNS: nodes resolve through the confluent server (dnsmasq), which forwards
# to this upstream.  The node domain is DNS_DOMAIN.
DNS_UPSTREAM=1.1.1.1
DNS_DOMAIN=confluent.lab

# tmux session that hosts the BMC emulator processes.
TMUX_SESSION=confluent-lab

# Download sources and the confluent package repository.  A close download
# mirror is picked automatically from the geo-sorted MIRRORLIST_URL (the same
# service dnf uses); set it empty to always download from the URLs below.
# Custom CLOUDIMG_URL/DVDISO_URL values are always used as-is.
MIRRORLIST_URL=https://mirrors.almalinux.org/mirrorlist/10/baseos
CLOUDIMG_URL=https://repo.almalinux.org/almalinux/10/cloud/x86_64/images/AlmaLinux-10-GenericCloud-latest.x86_64.qcow2
DVDISO_URL=https://repo.almalinux.org/almalinux/10/isos/x86_64/AlmaLinux-10-latest-x86_64-dvd.iso
LENOVO_REPO_BASEURL=https://hpc.lenovo.com/yum/latest/el10/x86_64/

# UEFI firmware and qemu binary are autodetected; uncomment to override.
#OVMF_CODE=/usr/share/edk2/ovmf/OVMF_CODE.fd
#OVMF_VARS_TEMPLATE=/usr/share/edk2/ovmf/OVMF_VARS.fd
#QEMU_EMULATOR=/usr/bin/qemu-system-x86_64
